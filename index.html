<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>시흥시 통반경계도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
 :root{--blue:#1769aa}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif}
 #map{position:absolute;top:0;bottom:0;left:0;right:0;background:#eef}
 .panel{position:absolute;z-index:1000;top:10px;left:10px;width:280px;max-height:calc(100% - 20px);
   overflow:auto;background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.3);
   padding:12px 14px;font-size:13px}
 .panel h1{font-size:15px;margin:0 0 8px}
 .panel .sub{color:#666;font-size:11px;margin:-4px 0 8px}
 .panel label{display:block;font-weight:600;color:#444;margin:10px 0 4px;font-size:12px}
 .panel input,.panel select{width:100%;height:32px;padding:0 8px;border:1px solid #ccc;
   border-radius:7px;font-size:13px}
 .row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
 .row.tight{gap:4px}
 button.b{height:30px;padding:0 10px;border:1px solid #ccc;border-radius:7px;background:#fff;
   cursor:pointer;font-size:12px}
 button.b.on{background:var(--blue);color:#fff;border-color:var(--blue)}
 button.b:disabled{opacity:.45;cursor:not-allowed}
 button.wide{width:100%;height:34px;margin-top:6px;font-weight:600}
 #res{margin-top:10px;color:#222;line-height:1.5;border-top:1px solid #eee;padding-top:8px}
 #status{margin-top:6px;color:#7a5b00;font-size:11px;min-height:14px}
 .legend{margin-top:8px;color:#555;font-size:11px;border-top:1px solid #eee;padding-top:6px}
 .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
 .hint{color:#888;font-size:10.5px;margin-top:3px;line-height:1.4}
 .selbar{margin-top:8px;border-top:1px solid #eee;padding-top:8px}
 .selhead{display:flex;justify-content:space-between;align-items:center;font-size:12px}
 .chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
 .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border:2px solid #333;
   border-radius:12px;font-size:11px;font-weight:700;background:#fff}
 .chip b{cursor:pointer;color:#c00;font-size:13px;line-height:1}
 .selinfo{margin-top:6px;color:#333;font-size:11px}
 .issues{margin-top:8px;font-size:11.5px;border-top:1px solid #eee;padding-top:8px;line-height:1.5}
 .issues .big{font-size:13px;font-weight:700}
 .issues .warn{color:#a15c00}
 .issues details{margin-top:4px}
 .issues summary{cursor:pointer;color:var(--blue)}
 .issues ul{margin:4px 0 0;padding-left:16px}
 .issues li{margin:1px 0;color:#555}
 #panel-toggle{position:absolute;z-index:1001;top:10px;left:10px;width:42px;height:42px;
   border:none;border-radius:10px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.3);
   font-size:20px;cursor:pointer;display:none}
 .tong-label{display:inline-block;min-width:16px;padding:0 5px;background:rgba(255,255,255,.93);
   border:2px solid #333;border-radius:11px;font-weight:700;font-size:12px;line-height:15px;
   color:#111;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.4)}
 .dong-label{font-weight:700;font-size:12px;color:#111;text-shadow:0 0 3px #fff,0 0 3px #fff}
 .leaflet-popup-content{font-size:13px}
 .curdong{font-size:16px;font-weight:700;color:var(--blue);margin:2px 0 8px}
 #dong-badge{position:absolute;z-index:1000;top:10px;left:50%;transform:translateX(-50%);
   background:var(--blue);color:#fff;font-weight:700;font-size:14px;padding:5px 14px;
   border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.35);display:none;pointer-events:none}
 @media(max-width:640px){
   .panel{width:calc(100% - 20px);max-height:55%;display:none}
   .panel.open{display:block}
   #panel-toggle{display:block}
 }
</style></head><body>
<button id="panel-toggle">☰</button>
<div id="dong-badge"></div>
<div class="panel" id="panel">
  <h1>시흥시 통반경계도</h1>
  <div id="cur-dong" class="curdong">시흥시 전체</div>
  <div class="sub">행정동을 선택하면 통·반 경계가 표시됩니다.</div>

  <label>행정동 선택</label>
  <input id="dong-search" placeholder="동 이름 검색 (예: 군자)"/>
  <select id="dong-select" size="6" style="height:auto;margin-top:6px"></select>
  <button class="b wide" id="overview-btn">🗺️ 전체지도 보기</button>

  <label>경계 방식</label>
  <div class="row tight" id="bmode">
    <button class="b on" id="bm-clean">깔끔(도로망)</button>
    <button class="b" id="bm-parcel">별표(필지)</button>
  </div>
  <div class="hint">깔끔=도로 중심선 경계 · 별표=시행규칙 지번 그대로(법적)</div>

  <label>배경지도</label>
  <div class="row tight" id="bases">
    <button class="b on" data-base="osm">일반</button>
    <button class="b" data-base="sat">위성</button>
    <button class="b" data-base="cad">지적편집도</button>
  </div>

  <label>표시 토글</label>
  <div class="row tight">
    <button class="b on" id="t-fill">면</button>
    <button class="b" id="t-line">경계선</button>
    <button class="b on" id="t-label">통번호</button>
    <button class="b on" id="t-admin">동경계</button>
  </div>
  <div class="hint">통 클릭 = 단일 선택 · Ctrl+클릭(우클릭/길게) = 다중 선택</div>
  <div id="selbar" class="selbar" style="display:none">
    <div class="selhead"><b id="selcount">0개 통 선택됨</b>
      <button class="b" id="sel-clear" style="height:24px;padding:0 8px">전체 해제</button></div>
    <div id="selchips" class="chips"></div>
    <div id="selinfo" class="selinfo"></div>
  </div>

  <label>색상 / 스타일</label>
  <div class="row tight" id="palettes">
    <button class="b" data-pal="default">기본</button>
    <button class="b" data-pal="pastel">파스텔</button>
    <button class="b" data-pal="vivid">원색</button>
    <button class="b" data-pal="gray">흑백</button>
  </div>
  <div class="row tight" style="align-items:center;margin-top:6px">
    <span style="font-size:11px;color:#555">선택 통 색</span>
    <input type="color" id="tcolor" disabled title="통을 선택하면 색을 바꿀 수 있습니다"
      style="width:38px;height:28px;padding:1px;border:1px solid #ccc;border-radius:6px"/>
    <button class="b" id="color-reset" style="margin-left:auto">색 초기화</button>
  </div>
  <div style="font-size:11px;color:#555;margin-top:7px">선 두께
    <input type="range" id="lw" min="1" max="6" step="0.5" style="width:100%;margin-top:2px"></div>
  <div style="font-size:11px;color:#555;margin-top:4px">채우기 투명도
    <input type="range" id="fa" min="0.1" max="0.85" step="0.05" style="width:100%;margin-top:2px"></div>

  <label>인쇄용 출력 (PDF/PNG)</label>
  <button class="b wide" id="export-print">🖨️ 출력 설정 내보내기</button>
  <div class="hint">설정 파일 다운로드 → 터미널에서 <code>gen_print.py --export</code> 실행 → 고해상도 PDF·PNG</div>

  <label>주소 검색 (도로명·지번)</label>
  <div class="row tight">
    <input id="q" placeholder="마유로20번길 35 / 지번: 491" style="flex:1"/>
    <button class="b" id="go">조회</button>
  </div>
  <div class="hint">도로명(로·길 포함)은 전 동 검색 · 지번은 현재 동 안</div>

  <div id="res">행정동을 선택하거나 전체지도를 보세요.</div>
  <div id="status"></div>
  <div id="issues" class="issues" style="display:none"></div>
  <div class="legend">
    <span><i style="background:#888"></i>별표 지번(법적 근거)</span> ·
    <span><i style="background:#bbb"></i>도로 보정</span> ·
    <span>점선=근사 분할</span>
  </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== 브이월드 자리(키 발급 후 입력하면 위성/지적편집도 활성) =====
const VWORLD_KEY = "";  // https://www.vworld.kr 개발키(무료) + 도메인 등록 후 입력
const JUSO_KEY = "devU01TX0FVVEgyMDI2MDYyMDExMjM0NTExOTQ2NzM=";  // juso.go.kr 개발키(도로명주소 검색)

// ---------- 배경지도 ----------
const bases = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {attribution:'© OpenStreetMap', maxZoom:19}),
  sat: VWORLD_KEY && L.tileLayer(
        `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
        {attribution:'© VWorld', maxZoom:19}),
  cad: VWORLD_KEY && L.tileLayer(
        `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Base/{z}/{y}/{x}.png`,
        {attribution:'© VWorld 지적', maxZoom:19}),
};
const map = L.map('map', {zoomControl:false}).setView([37.38, 126.80], 11);
L.control.zoom({position:'topright'}).addTo(map);
let curBase = bases.osm.addTo(map);
document.querySelectorAll('#bases button').forEach(btn=>{
  const key = btn.dataset.base;
  if(key!=='osm' && !bases[key]){ btn.disabled=true; btn.title='브이월드 API 키 필요 (index.html VWORLD_KEY)'; }
  btn.onclick=()=>{
    if(!bases[key]) return;
    map.removeLayer(curBase); curBase = bases[key].addTo(map); curBase.bringToBack();
    document.querySelectorAll('#bases button').forEach(b=>b.classList.toggle('on', b===btn));
  };
});

// ---------- 색상/스타일 설정 (localStorage, 5단계) ----------
const PALETTES = {
  default: t => `hsl(${(t*47)%360},65%,55%)`,
  pastel:  t => `hsl(${(t*47)%360},48%,78%)`,
  vivid:   t => `hsl(${(t*47)%360},85%,48%)`,
  gray:    t => `hsl(0,0%,${35+((t*53)%50)}%)`,    // 인쇄용 흑백(명도 변주)
};
const DEFAULT_SETTINGS = { palette:'default', tongColors:{}, lineWeight:3, fillAlpha:0.45 };
let settings = Object.assign({}, DEFAULT_SETTINGS,
  JSON.parse(localStorage.getItem('tongban_style') || '{}'));
let curCode = null;                                  // 현재 동 코드(통별 색 키)
function saveSettings(){ localStorage.setItem('tongban_style', JSON.stringify(settings)); }
function color(t){
  return settings.tongColors[curCode + ':' + t] || (PALETTES[settings.palette] || PALETTES.default)(t);
}
const approx = f => !!(f.properties && f.properties.근사);
const road = f => { const m=f.properties&&f.properties.fill_method;
  return m==='road_match'||m==='road_split'||m==='manual_pending'; };
const fmKor = m => ({road_match:'도로(통째 보정)',road_split:'도로(분할 보정)',
  manual_pending:'도로(수동 검토 대상)',parcel_match:'별표 지번(법적 근거)'}[m]||'');
let mode = 'fill';
const selected = new Set();                  // 선택된 통 번호(현재 동 기준)
const selActive = () => selected.size > 0;
const pStyle = f => { const t=f.properties.통, a=approx(f), rd=road(f);
  const on=selected.has(t), dim=selActive()&&!on;
  return {
    color:color(t), weight: on?2.5:(a?2:(rd?0.6:1)), dashArray:a?'5 4':null,
    fillOpacity: mode==='fill' ? (dim?0.06:(on?0.62:(a?settings.fillAlpha*0.66:(rd?settings.fillAlpha*0.62:settings.fillAlpha)))) : (on?0.18:0),
    opacity: mode==='fill' ? (dim?0.25:(on?1:(a?0.95:(rd?0.5:0.6)))) : (dim?0.25:0.9) }; };
const TONG_LINE='#333';                      // 통 경계선: 채우기와 대비되는 어두운 중립색
const tongStyle = f => { const on=selected.has(f.properties.통), dim=selActive()&&!on;
  return { color:TONG_LINE, weight:on?settings.lineWeight+2:settings.lineWeight,
    dashArray:approx(f)?'5 4':null, fill:false, opacity: dim?0.35:0.95 }; };

// ---------- 상태 ----------
let manifest=null, cur={neighbors:null,parcels:null,tong:null,admin:null,labels:null}, curParcels=null;
let ov={mask:null,tong:null,admin:null,city:null,labels:null};
let allAdminCache=null;   // out/overview/all_admin.geojson 캐시(이웃 동 클릭용)
let curTongData=null;     // 필지기반 통 GeoJSON
let curParcelsData=null, curRoadblockData=null, curLineData=null;
let boundaryMode='clean'; // 'clean'(도로망 깔끔) | 'parcel'(별표·필지)
const $ = id => document.getElementById(id);
const setStatus = s => $('status').textContent = s||'';

// ---------- 동 목록 ----------
fetch('out/manifest.json').then(r=>r.json()).then(m=>{
  manifest = m; renderDongList(m.dongs); showOverview();
}).catch(e=> setStatus('manifest 로드 실패 — 웹서버로 열었는지 확인 (file:// 불가)'));

// 8단계 검증 안내(미표시 통/충돌/미배정)
let issuesData={};
fetch('out/issues.json').then(r=>r.json())
  .then(d=>{ issuesData=d; if(curCode) showIssues(curCode); else showCityIssues(); }).catch(()=>{});
function showIssues(code){
  const el=$('issues'), v=issuesData[code]; if(!el) return;
  if(!v){ el.style.display='none'; return; }
  el.style.display='block';
  let h=`<span class="big">표 ${v.n_table}통 중 <b>${v.n_drawn}통</b> 표시</span>`;
  if(v.n_missing>0){
    h+=` <span class="warn">· 미표시 ${v.n_missing}통</span>`+
       `<details><summary>미표시 통 ${v.n_missing}개 보기</summary><ul>`+
       v.missing.map(m=>`<li>${m.통}통 — ${m.사유||m.유형||''}</li>`).join('')+`</ul></details>`;
  }
  const ex=[];
  if(v.n_conflict) ex.push(`충돌 ${v.n_conflict}건`);
  if(v.n_unassigned) ex.push(`미배정 필지 ${v.n_unassigned}`);
  if(ex.length) h+=`<div style="margin-top:3px;color:#888">${ex.join(' · ')} <small>(검수용)</small></div>`;
  el.innerHTML=h;
}
function showCityIssues(){
  const el=$('issues'); if(!el) return;
  const vals=Object.values(issuesData); if(!vals.length){ el.style.display='none'; return; }
  const T=vals.reduce((a,v)=>a+v.n_table,0), D=vals.reduce((a,v)=>a+v.n_drawn,0);
  el.style.display='block';
  el.innerHTML=`<span class="big">시흥시 표 ${T}통 중 <b>${D}통</b> 표시</span>`+
    (T-D>0?` <span class="warn">· 미표시 ${T-D}통</span>`+
      `<div style="color:#888;margin-top:2px">동을 선택하면 동별 상세</div>`:'');
}

function renderDongList(dongs){
  const sel = $('dong-select'); sel.innerHTML='';
  dongs.forEach(d=>{ const o=document.createElement('option');
    o.value=d.code; o.textContent=`${d.dong} (${d.n_tong}통)`; o.dataset.dong=d.dong; sel.appendChild(o); });
  sel.onchange = ()=>{ const o=sel.selectedOptions[0]; if(o) loadDong(o.value, o.dataset.dong); };
}
$('dong-search').addEventListener('input', e=>{
  const q=e.target.value.trim();
  [...$('dong-select').options].forEach(o=>{ o.hidden = q && !o.dataset.dong.includes(q); });
});

// ---------- 레이어 정리 ----------
function clearGroup(g){ for(const k in g){ if(g[k]){ map.removeLayer(g[k]); g[k]=null; } } }

// ---------- 단일 동 상세 ----------
function loadDong(code, dong, afterLoad){
  clearGroup(ov); clearGroup(cur); curParcels=null;
  selected.clear(); updateSelPanel(); curCode=code;
  $('cur-dong').textContent='📍 '+dong;
  $('dong-badge').textContent=dong; $('dong-badge').style.display='block';
  setStatus(`${dong} 불러오는 중…`);
  const base = `out/${code}/${dong}`;
  Promise.all([
    fetch(`${base}_parcels.geojson`).then(r=>r.json()),
    fetch(`${base}_tong.geojson`).then(r=>r.json()),
    fetch(`${base}_tong_roadblock.geojson`).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch(`${base}_admin.geojson`).then(r=>r.json()),
  ]).then(([parcels,tong,roadblock,admin])=>{
    curParcelsData=parcels; curTongData=tong; curRoadblockData=roadblock;
    cur.admin = L.geoJSON(admin,{style:{color:'#111',weight:4,fill:false,opacity:.85}}).addTo(map);
    renderBoundary();
    loadNeighbors(code);
    map.fitBounds(cur.admin.getBounds(),{padding:[20,20]});
    $('res').innerHTML = `<b>${dong}</b> 표시 중 — 통/필지를 클릭하거나 지번을 검색하세요.`;
    setStatus(''); showIssues(code);
    if(afterLoad) afterLoad();
    if(window.matchMedia('(max-width:640px)').matches) $('panel').classList.remove('open');
  }).catch(e=> setStatus(`${dong} 로드 실패: ${e}`));
}

// 경계 레이어(채움/외곽선/라벨)를 현재 모드(도로망 vs 필지)로 그림
function renderBoundary(){
  ['parcels','tong','labels'].forEach(k=>{ if(cur[k]){ map.removeLayer(cur[k]); cur[k]=null; } });
  const clean = boundaryMode==='clean' && curRoadblockData;
  const fillData = clean ? curRoadblockData : curParcelsData;
  curLineData = clean ? curRoadblockData : curTongData;
  cur.parcels = L.geoJSON(fillData,{style:pStyle,onEachFeature:(f,l)=>{
    const p=f.properties;
    const txt = clean ? `<b>${p.통}통</b>`
      : approx(f) ? `<b>${p.통}통 (근사 분할)</b><br>${p.법정동} ${p.지번}`
      : road(f) ? `${p.법정동} ${p.지번} <small>(도로)</small><br><b>${p.통}통</b><br><small>${fmKor(p.fill_method)}</small>`
      : `${p.법정동} ${p.지번}<br><b>${p.통}통 ${p.반}반</b>`;
    l.bindPopup(txt);
    l.on('click', e=>{ $('res').innerHTML=txt; const m=e.originalEvent;
      if(m.ctrlKey||m.metaKey||m.shiftKey) toggleTong(p.통); else selectSingle(p.통); });
    l.on('contextmenu', e=>{ L.DomEvent.preventDefault(e); $('res').innerHTML=txt; toggleTong(p.통); });
  }}).addTo(map);
  curParcels = cur.parcels;
  cur.tong = L.geoJSON(curLineData,{style:tongStyle}).addTo(map);
  buildLabels(curLineData.features);
  cur.labels.addTo(map);
  applyToggles();
}

// ---------- 이웃 동 클릭 이동(상세 보기에서 다른 동으로 점프) ----------
function loadNeighbors(curCode){
  const NB={color:'#999',weight:1,fillColor:'#000',fillOpacity:0.01,opacity:0.5,dashArray:'2 3'};
  const add = data => {
    cur.neighbors = L.geoJSON(data,{
      filter: f => f.properties.code !== curCode,        // 현재 동 제외(이웃만)
      style: NB,
      onEachFeature: (f,l) => { const p=f.properties;
        l.bindTooltip(`${p.dong} (클릭하면 이동)`, {sticky:true});
        l.on('click', ()=> loadDong(p.code, p.dong));
        l.on('mouseover', ()=> l.setStyle({fillOpacity:0.12, color:'#1769aa', weight:2, opacity:0.9}));
        l.on('mouseout',  ()=> l.setStyle(NB));
      }}).addTo(map);
    cur.neighbors.bringToBack();      // 현재 동 필지/통 아래로 → 동 안쪽 클릭은 필지(통 선택) 유지
    curBase.bringToBack();            // 배경 타일은 맨 아래
  };
  if(allAdminCache) add(allAdminCache);
  else fetch('out/overview/all_admin.geojson').then(r=>r.json())
        .then(d=>{ allAdminCache=d; add(d); }).catch(()=>{});
}

// ---------- 전체지도 ----------
function showOverview(){
  clearGroup(cur); clearGroup(ov); curParcels=null;
  selected.clear(); updateSelPanel();
  $('cur-dong').textContent='시흥시 전체'; $('dong-badge').style.display='none';
  $('dong-select').value=''; setStatus('전체지도 불러오는 중…');
  Promise.all([
    fetch('out/overview/all_tong.geojson').then(r=>r.json()),
    fetch('out/overview/all_admin.geojson').then(r=>r.json()),
    fetch('out/overview/city_boundary.geojson').then(r=>r.json()),
  ]).then(([tong,admin,city])=>{
    const dcolor = code => `hsl(${(parseInt(code.slice(-3))*53)%360},55%,60%)`;
    // ② 스포트라이트: 시흥시 밖을 어둡게(시 경계를 구멍으로 뚫은 마스크)
    const holes=[];
    (city.features||[]).forEach(f=>{ const g=f.geometry;
      const polys = g.type==='Polygon' ? [g.coordinates] : g.coordinates;
      polys.forEach(poly=> holes.push(poly[0].map(c=>[c[1],c[0]]))); });
    const worldRect=[[-85,-185],[-85,185],[85,185],[85,-185]];
    ov.mask = L.polygon([worldRect, ...holes],
      {stroke:false, fillColor:'#16233f', fillOpacity:0.33, interactive:false}).addTo(map);
    ov.tong = L.geoJSON(tong,{style:f=>({color:dcolor(f.properties.code),weight:.5,
      fillColor:dcolor(f.properties.code),fillOpacity:.5,opacity:.7}),
      onEachFeature:(f,l)=>{ const p=f.properties;
        l.bindPopup(`<b>${p.dong}</b> ${p.통}통<br><small>클릭하면 상세 보기</small>`);
        l.on('click',()=>loadDong(p.code,p.dong)); }}).addTo(map);
    ov.admin = L.geoJSON(admin,{style:{color:'#333',weight:1.2,fill:false,opacity:.7}}).addTo(map);
    // ① 시흥시 외곽선(굵은 대비색) — 주변 시와 확실히 구분
    ov.city = L.geoJSON(city,{interactive:false,
      style:{color:'#c0392b',weight:4,fill:false,opacity:.95}}).addTo(map);
    ov.labels = L.layerGroup();
    (manifest.dongs||[]).forEach(d=> ov.labels.addLayer(
      L.marker(d.center,{interactive:false,keyboard:false,
        icon:L.divIcon({className:'',html:`<span class="dong-label">${d.dong}</span>`,iconSize:[60,16],iconAnchor:[30,8]})})));
    ov.labels.addTo(map);
    map.fitBounds(ov.city.getBounds(),{padding:[20,20]});
    $('res').innerHTML = `<b>시흥시 전체</b> — 동을 클릭하거나 목록에서 선택하세요.`;
    setStatus(''); showCityIssues();
  }).catch(e=> setStatus('전체지도 로드 실패: '+e));
}
$('overview-btn').onclick = showOverview;
$('bm-clean').onclick = ()=> setBoundaryMode('clean');
$('bm-parcel').onclick = ()=> setBoundaryMode('parcel');
function setBoundaryMode(m){
  boundaryMode=m;
  $('bm-clean').classList.toggle('on', m==='clean');
  $('bm-parcel').classList.toggle('on', m==='parcel');
  if(cur.admin) renderBoundary();
}

// ---------- 토글 ----------
function applyToggles(){
  if(cur.parcels){ cur.parcels.setStyle(pStyle); }
  toggleLayer($('t-label').classList.contains('on'), cur.labels);
  toggleLayer($('t-admin').classList.contains('on'), cur.admin);
}
function toggleLayer(on, layer){ if(!layer) return; if(on){ if(!map.hasLayer(layer)) layer.addTo(map);} else { if(map.hasLayer(layer)) map.removeLayer(layer);} }
function press(btn,on){ btn.classList.toggle('on',on); }
$('t-fill').onclick = e=>{ mode='fill'; press(e.target,true); press($('t-line'),false); applyToggles(); };
$('t-line').onclick = e=>{ mode='line'; press(e.target,true); press($('t-fill'),false); applyToggles(); };
$('t-label').onclick= e=>{ press(e.target,!e.target.classList.contains('on')); applyToggles(); };
$('t-admin').onclick= e=>{ press(e.target,!e.target.classList.contains('on')); applyToggles(); };

// ---------- 지번 검색 ----------
function search(){
  const v=$('q').value.trim(); if(!v){ setStatus('검색어를 입력하세요.'); return; }
  if(/[로길]/.test(v)) searchAddress(v);      // 도로명주소 → juso
  else searchJibun(v);                         // 지번(현재 동)
}
// 지번 검색(현재 표시 동 안)
function searchJibun(v){
  if(!curParcelsData){ setStatus('지번 검색은 동을 먼저 선택하세요. (도로명은 동 선택 없이 가능)'); return; }
  const f=(curParcelsData.features||[]).find(f=>{ const j=f.properties.지번; return j===v||j===('산'+v); });
  if(f){ const p=f.properties; map.fitBounds(L.geoJSON(f).getBounds(),{maxZoom:18});
    $('res').innerHTML=`<b>${p.법정동} ${p.지번}</b><br>${p.통}통 ${p.반||''}반 <small>(별표 지번)</small>`; setStatus(''); }
  else setStatus(`"${v}" 지번을 못 찾음 (현재 동 별표에 없을 수 있음)`);
}
// 주소 인덱스 지연 로드
let addrIndex=null;
function ensureIndex(){ return addrIndex ? Promise.resolve(addrIndex)
  : fetch('out/address_index.json').then(r=>r.json()).then(d=>(addrIndex=d.index)); }
// 도로명주소 검색(juso) → 지번 변환 → 인덱스로 통 조회 → 해당 동 로드+강조
function searchAddress(kw){
  if(!JUSO_KEY){ setStatus('도로명 검색은 juso 키 필요(index.html JUSO_KEY)'); return; }
  setStatus('주소 검색 중…');
  const url='https://www.juso.go.kr/addrlink/addrLinkApi.do?'+new URLSearchParams(
    {confmKey:JUSO_KEY,currentPage:1,countPerPage:5,keyword:kw,resultType:'json'});
  fetch(url).then(r=>r.json()).then(d=>{
    const j=d.results&&d.results.juso&&d.results.juso[0];
    if(!j){ setStatus(`"${kw}" 주소를 찾지 못했습니다.`); return; }
    const m=j.jibunAddr.match(/시흥시\s+(\S*?[동리])\s+(산?\d+(?:-\d+)?)/);
    if(!m){ setStatus(`지번 변환 실패: ${j.jibunAddr}`); return; }
    const key=m[1]+'|'+m[2];
    ensureIndex().then(idx=>{
      const hit=idx[key];
      if(!hit){ $('res').innerHTML=`<b>${j.roadAddr}</b><br>${m[1]} ${m[2]} <small>— 별표에 없는 지번(통 미상)</small>`; setStatus(''); return; }
      const [code,dong,t,b]=hit;
      loadDong(code,dong,()=>{
        selectSingle(t);
        let lyr=null; cur.parcels.eachLayer(l=>{ if(!lyr && l.feature.properties.통===t) lyr=l; });
        if(lyr) map.fitBounds(lyr.getBounds().pad(.4),{maxZoom:17});
        $('res').innerHTML=`<b>${j.roadAddr}</b><br>${m[1]} ${m[2]} → <b>${dong} ${t}통${b?' '+b+'반':''}</b>`;
        setStatus('');
      });
    });
  }).catch(e=> setStatus('주소 검색 실패: '+e));
}
$('go').onclick = search;
$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') search(); });

// 출력 설정 내보내기 → gen_print.py --export 로 고해상도 PDF/PNG
$('export-print').onclick = ()=>{
  if(!curCode){ setStatus('동을 먼저 선택하세요(출력은 동 단위).'); return; }
  const s={ code:curCode, dong:$('cur-dong').textContent.replace('📍 ','').trim(),
    palette:settings.palette, lineWeight:settings.lineWeight, fillAlpha:settings.fillAlpha,
    tongColors:settings.tongColors, select:[...selected].map(String), boundaryMode,
    paper:'A4', orient:'landscape', date:new Date().toISOString().slice(0,10) };
  const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='print_settings.json'; document.body.appendChild(a); a.click(); a.remove();
  $('res').innerHTML=`출력 설정 다운로드됨 (${s.dong}).<br>`+
    `<small>터미널: <code>python gen_print.py --export print_settings.json</code></small>`;
};

// ---------- 다중 통 선택 ----------
function selectSingle(t){ selected.clear(); selected.add(t); afterSel(); }
function toggleTong(t){ selected.has(t) ? selected.delete(t) : selected.add(t); afterSel(); }
function clearSelection(){ selected.clear(); afterSel(); }
function afterSel(){
  if(cur.parcels) cur.parcels.setStyle(pStyle);
  if(cur.tong) cur.tong.setStyle(tongStyle);
  updateSelPanel();
}
function updateSelPanel(){
  const tc=$('tcolor'); if(tc) tc.disabled=!selActive();
  const bar=$('selbar'); if(!bar) return;
  if(!selActive()){ bar.style.display='none'; return; }
  bar.style.display='block';
  const arr=[...selected].sort((a,b)=>a-b);
  $('selcount').textContent = `${arr.length}개 통 선택됨`;
  $('selchips').innerHTML = arr.map(t=>
    `<span class="chip" style="border-color:${color(t)}">${t}통<b data-t="${t}">×</b></span>`).join('');
  $('selchips').querySelectorAll('b[data-t]').forEach(x=>
    x.onclick = ()=>{ selected.delete(+x.dataset.t); afterSel(); });
  let nParcel=0;
  if(cur.parcels) cur.parcels.eachLayer(l=>{ if(selected.has(l.feature.properties.통)) nParcel++; });
  $('selinfo').textContent = `통 ${arr.join(', ')} · 필지 합계 ${nParcel}개`;
}
$('sel-clear').onclick = clearSelection;

// ---------- 색상/스타일 적용 (5단계) ----------
function buildLabels(features){
  cur.labels = L.layerGroup();
  (features||[]).forEach(f=>{ const p=f.properties;
    if(p.lat==null||p.lon==null) return;
    const bs=approx(f)?'dashed':'solid';
    cur.labels.addLayer(L.marker([p.lat,p.lon],{interactive:false,keyboard:false,icon:
      L.divIcon({className:'',iconSize:[26,19],iconAnchor:[13,10],
        html:`<div class="tong-label" style="border-color:${color(p.통)};border-style:${bs}">${p.통}</div>`})}));
  });
}
function recolor(){
  if(cur.parcels) cur.parcels.setStyle(pStyle);
  if(cur.tong) cur.tong.setStyle(tongStyle);
  if(cur.labels){ const wasOn=map.hasLayer(cur.labels); map.removeLayer(cur.labels);
    buildLabels(curLineData ? curLineData.features : []); if(wasOn) cur.labels.addTo(map); }
  updateSelPanel(); saveSettings();
}
document.querySelectorAll('#palettes button').forEach(b=> b.onclick=()=>{
  settings.palette=b.dataset.pal;
  document.querySelectorAll('#palettes button').forEach(x=>x.classList.toggle('on',x===b));
  recolor();
});
$('tcolor').addEventListener('input', e=>{
  if(!selActive()) return;
  selected.forEach(t=> settings.tongColors[curCode+':'+t]=e.target.value);
  recolor();
});
$('color-reset').onclick=()=>{
  Object.keys(settings.tongColors).forEach(k=>{ if(k.startsWith(curCode+':')) delete settings.tongColors[k]; });
  recolor();
};
$('lw').addEventListener('input', e=>{ settings.lineWeight=+e.target.value; recolor(); });
$('fa').addEventListener('input', e=>{ settings.fillAlpha=+e.target.value; recolor(); });
(function initStyleUI(){
  document.querySelectorAll('#palettes button').forEach(x=>x.classList.toggle('on',x.dataset.pal===settings.palette));
  $('lw').value=settings.lineWeight; $('fa').value=settings.fillAlpha;
})();

// ---------- 모바일 패널 ----------
$('panel-toggle').onclick = ()=> $('panel').classList.toggle('open');
</script>
