<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>시흥시 통반경계도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
 :root{--blue:#1769aa}
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif}
 #map{position:absolute;top:0;bottom:0;left:0;right:0;background:#eef}
 .panel{position:absolute;z-index:1000;top:10px;left:10px;width:280px;max-height:calc(100% - 20px);
   overflow:auto;background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.3);
   padding:12px 14px;font-size:13px}
 .panel h1{font-size:15px;margin:0 0 8px}
 .panel .sub{color:#666;font-size:11px;margin:-4px 0 8px}
 .panel label{display:block;font-weight:600;color:#444;margin:10px 0 4px;font-size:12px}
 .panel input,.panel select{width:100%;height:32px;padding:0 8px;border:1px solid #ccc;
   border-radius:7px;font-size:13px}
 .row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
 .row.tight{gap:4px}
 button.b{height:30px;padding:0 10px;border:1px solid #ccc;border-radius:7px;background:#fff;
   cursor:pointer;font-size:12px}
 button.b.on{background:var(--blue);color:#fff;border-color:var(--blue)}
 button.b:disabled{opacity:.45;cursor:not-allowed}
 button.wide{width:100%;height:34px;margin-top:6px;font-weight:600}
 #res{margin-top:10px;color:#222;line-height:1.5;border-top:1px solid #eee;padding-top:8px}
 #status{margin-top:6px;color:#7a5b00;font-size:11px;min-height:14px}
 .legend{margin-top:8px;color:#555;font-size:11px;border-top:1px solid #eee;padding-top:6px}
 .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
 .hint{color:#888;font-size:10.5px;margin-top:3px;line-height:1.4}
 .selbar{margin-top:8px;border-top:1px solid #eee;padding-top:8px}
 .selhead{display:flex;justify-content:space-between;align-items:center;font-size:12px}
 .chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
 .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border:2px solid #333;
   border-radius:12px;font-size:11px;font-weight:700;background:#fff}
 .chip b{cursor:pointer;color:#c00;font-size:13px;line-height:1}
 .selinfo{margin-top:6px;color:#333;font-size:11px}
 #panel-toggle{position:absolute;z-index:1001;top:10px;left:10px;width:42px;height:42px;
   border:none;border-radius:10px;background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.3);
   font-size:20px;cursor:pointer;display:none}
 .tong-label{display:inline-block;min-width:16px;padding:0 5px;background:rgba(255,255,255,.93);
   border:2px solid #333;border-radius:11px;font-weight:700;font-size:12px;line-height:15px;
   color:#111;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.4)}
 .dong-label{font-weight:700;font-size:12px;color:#111;text-shadow:0 0 3px #fff,0 0 3px #fff}
 .leaflet-popup-content{font-size:13px}
 @media(max-width:640px){
   .panel{width:calc(100% - 20px);max-height:55%;display:none}
   .panel.open{display:block}
   #panel-toggle{display:block}
 }
</style></head><body>
<button id="panel-toggle">☰</button>
<div class="panel" id="panel">
  <h1>시흥시 통반경계도</h1>
  <div class="sub">행정동을 선택하면 통·반 경계가 표시됩니다.</div>

  <label>행정동 선택</label>
  <input id="dong-search" placeholder="동 이름 검색 (예: 군자)"/>
  <select id="dong-select" size="6" style="height:auto;margin-top:6px"></select>
  <button class="b wide" id="overview-btn">🗺️ 전체지도 보기</button>

  <label>배경지도</label>
  <div class="row tight" id="bases">
    <button class="b on" data-base="osm">일반</button>
    <button class="b" data-base="sat">위성</button>
    <button class="b" data-base="cad">지적편집도</button>
  </div>

  <label>표시 토글</label>
  <div class="row tight">
    <button class="b on" id="t-fill">면</button>
    <button class="b" id="t-line">경계선</button>
    <button class="b on" id="t-label">통번호</button>
    <button class="b on" id="t-admin">동경계</button>
  </div>
  <div class="hint">통 클릭 = 단일 선택 · Ctrl+클릭(우클릭/길게) = 다중 선택</div>
  <div id="selbar" class="selbar" style="display:none">
    <div class="selhead"><b id="selcount">0개 통 선택됨</b>
      <button class="b" id="sel-clear" style="height:24px;padding:0 8px">전체 해제</button></div>
    <div id="selchips" class="chips"></div>
    <div id="selinfo" class="selinfo"></div>
  </div>

  <label>지번 검색 (선택한 동 안에서)</label>
  <div class="row tight">
    <input id="q" placeholder="예: 491, 1769-1" style="flex:1"/>
    <button class="b" id="go">조회</button>
  </div>

  <div id="res">행정동을 선택하거나 전체지도를 보세요.</div>
  <div id="status"></div>
  <div class="legend">
    <span><i style="background:#888"></i>별표 지번(법적 근거)</span> ·
    <span><i style="background:#bbb"></i>도로 보정</span> ·
    <span>점선=근사 분할</span>
  </div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===== 브이월드 자리(키 발급 후 입력하면 위성/지적편집도 활성) =====
const VWORLD_KEY = "";  // https://www.vworld.kr 개발키(무료) + 도메인 등록 후 입력

// ---------- 배경지도 ----------
const bases = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {attribution:'© OpenStreetMap', maxZoom:19}),
  sat: VWORLD_KEY && L.tileLayer(
        `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
        {attribution:'© VWorld', maxZoom:19}),
  cad: VWORLD_KEY && L.tileLayer(
        `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Base/{z}/{y}/{x}.png`,
        {attribution:'© VWorld 지적', maxZoom:19}),
};
const map = L.map('map', {zoomControl:false}).setView([37.38, 126.80], 11);
L.control.zoom({position:'topright'}).addTo(map);
let curBase = bases.osm.addTo(map);
document.querySelectorAll('#bases button').forEach(btn=>{
  const key = btn.dataset.base;
  if(key!=='osm' && !bases[key]){ btn.disabled=true; btn.title='브이월드 API 키 필요 (index.html VWORLD_KEY)'; }
  btn.onclick=()=>{
    if(!bases[key]) return;
    map.removeLayer(curBase); curBase = bases[key].addTo(map); curBase.bringToBack();
    document.querySelectorAll('#bases button').forEach(b=>b.classList.toggle('on', b===btn));
  };
});

// ---------- 공통 스타일 ----------
function color(t){const h=(t*47)%360;return `hsl(${h},65%,55%)`;}
const approx = f => !!(f.properties && f.properties.근사);
const road = f => { const m=f.properties&&f.properties.fill_method;
  return m==='road_match'||m==='road_split'||m==='manual_pending'; };
const fmKor = m => ({road_match:'도로(통째 보정)',road_split:'도로(분할 보정)',
  manual_pending:'도로(수동 검토 대상)',parcel_match:'별표 지번(법적 근거)'}[m]||'');
let mode = 'fill';
const selected = new Set();                  // 선택된 통 번호(현재 동 기준)
const selActive = () => selected.size > 0;
const pStyle = f => { const t=f.properties.통, a=approx(f), rd=road(f);
  const on=selected.has(t), dim=selActive()&&!on;
  return {
    color:color(t), weight: on?2.5:(a?2:(rd?0.6:1)), dashArray:a?'5 4':null,
    fillOpacity: mode==='fill' ? (dim?0.06:(on?0.62:(a?0.3:(rd?0.28:0.45)))) : (on?0.18:0),
    opacity: mode==='fill' ? (dim?0.25:(on?1:(a?0.95:(rd?0.5:0.6)))) : (dim?0.25:0.9) }; };
const tongStyle = f => { const t=f.properties.통, on=selected.has(t), dim=selActive()&&!on;
  return { color:color(t), weight:on?5:3, dashArray:approx(f)?'5 4':null, fill:false,
    opacity: dim?0.3:0.95 }; };

// ---------- 상태 ----------
let manifest=null, cur={parcels:null,tong:null,admin:null,labels:null}, curParcels=null;
let ov={tong:null,admin:null,labels:null};
const $ = id => document.getElementById(id);
const setStatus = s => $('status').textContent = s||'';

// ---------- 동 목록 ----------
fetch('out/manifest.json').then(r=>r.json()).then(m=>{
  manifest = m; renderDongList(m.dongs); showOverview();
}).catch(e=> setStatus('manifest 로드 실패 — 웹서버로 열었는지 확인 (file:// 불가)'));

function renderDongList(dongs){
  const sel = $('dong-select'); sel.innerHTML='';
  dongs.forEach(d=>{ const o=document.createElement('option');
    o.value=d.code; o.textContent=`${d.dong} (${d.n_tong}통)`; o.dataset.dong=d.dong; sel.appendChild(o); });
  sel.onchange = ()=>{ const o=sel.selectedOptions[0]; if(o) loadDong(o.value, o.dataset.dong); };
}
$('dong-search').addEventListener('input', e=>{
  const q=e.target.value.trim();
  [...$('dong-select').options].forEach(o=>{ o.hidden = q && !o.dataset.dong.includes(q); });
});

// ---------- 레이어 정리 ----------
function clearGroup(g){ for(const k in g){ if(g[k]){ map.removeLayer(g[k]); g[k]=null; } } }

// ---------- 단일 동 상세 ----------
function loadDong(code, dong){
  clearGroup(ov); clearGroup(cur); curParcels=null;
  selected.clear(); updateSelPanel();
  setStatus(`${dong} 불러오는 중…`);
  const base = `out/${code}/${dong}`;
  Promise.all([
    fetch(`${base}_parcels.geojson`).then(r=>r.json()),
    fetch(`${base}_tong.geojson`).then(r=>r.json()),
    fetch(`${base}_admin.geojson`).then(r=>r.json()),
  ]).then(([parcels,tong,admin])=>{
    cur.admin = L.geoJSON(admin,{style:{color:'#111',weight:4,fill:false,opacity:.85}}).addTo(map);
    cur.parcels = L.geoJSON(parcels,{style:pStyle,onEachFeature:(f,l)=>{
      const p=f.properties;
      const txt = approx(f)
        ? `<b>${p.통}통 (근사 분할)</b><br>${p.법정동} ${p.지번}`
        : road(f)
        ? `${p.법정동} ${p.지번} <small>(도로)</small><br><b>${p.통}통</b><br><small>${fmKor(p.fill_method)}</small>`
        : `${p.법정동} ${p.지번}<br><b>${p.통}통 ${p.반}반</b>`;
      l.bindPopup(txt);
      l.on('click', e=>{ $('res').innerHTML=txt; const m=e.originalEvent;
        if(m.ctrlKey||m.metaKey||m.shiftKey) toggleTong(p.통); else selectSingle(p.통); });
      l.on('contextmenu', e=>{ L.DomEvent.preventDefault(e); $('res').innerHTML=txt; toggleTong(p.통); });
    }}).addTo(map);
    curParcels = cur.parcels;
    cur.tong = L.geoJSON(tong,{style:tongStyle}).addTo(map);
    cur.labels = L.layerGroup();
    (tong.features||[]).forEach(f=>{ const p=f.properties;
      if(p.lat==null||p.lon==null) return;
      const bs=approx(f)?'dashed':'solid';
      cur.labels.addLayer(L.marker([p.lat,p.lon],{interactive:false,keyboard:false,icon:
        L.divIcon({className:'',iconSize:[26,19],iconAnchor:[13,10],
          html:`<div class="tong-label" style="border-color:${color(p.통)};border-style:${bs}">${p.통}</div>`})}));
    });
    cur.labels.addTo(map);
    applyToggles();
    map.fitBounds(cur.admin.getBounds(),{padding:[20,20]});
    $('res').innerHTML = `<b>${dong}</b> 표시 중 — 필지를 클릭하거나 지번을 검색하세요.`;
    setStatus('');
    if(window.matchMedia('(max-width:640px)').matches) $('panel').classList.remove('open');
  }).catch(e=> setStatus(`${dong} 로드 실패: ${e}`));
}

// ---------- 전체지도 ----------
function showOverview(){
  clearGroup(cur); clearGroup(ov); curParcels=null;
  selected.clear(); updateSelPanel();
  $('dong-select').value=''; setStatus('전체지도 불러오는 중…');
  Promise.all([
    fetch('out/overview/all_tong.geojson').then(r=>r.json()),
    fetch('out/overview/all_admin.geojson').then(r=>r.json()),
  ]).then(([tong,admin])=>{
    const dcolor = code => `hsl(${(parseInt(code.slice(-3))*53)%360},55%,60%)`;
    ov.admin = L.geoJSON(admin,{style:{color:'#333',weight:1.5,fill:false,opacity:.8}}).addTo(map);
    ov.tong = L.geoJSON(tong,{style:f=>({color:dcolor(f.properties.code),weight:.5,
      fillColor:dcolor(f.properties.code),fillOpacity:.45,opacity:.7}),
      onEachFeature:(f,l)=>{ const p=f.properties;
        l.bindPopup(`<b>${p.dong}</b> ${p.통}통<br><small>클릭하면 상세 보기</small>`);
        l.on('click',()=>loadDong(p.code,p.dong)); }}).addTo(map);
    ov.labels = L.layerGroup();
    (manifest.dongs||[]).forEach(d=> ov.labels.addLayer(
      L.marker(d.center,{interactive:false,keyboard:false,
        icon:L.divIcon({className:'',html:`<span class="dong-label">${d.dong}</span>`,iconSize:[60,16],iconAnchor:[30,8]})})));
    ov.labels.addTo(map);
    map.fitBounds(ov.admin.getBounds(),{padding:[20,20]});
    $('res').innerHTML = `<b>시흥시 전체</b> — 동을 클릭하거나 목록에서 선택하세요.`;
    setStatus('');
  }).catch(e=> setStatus('전체지도 로드 실패: '+e));
}
$('overview-btn').onclick = showOverview;

// ---------- 토글 ----------
function applyToggles(){
  if(cur.parcels){ cur.parcels.setStyle(pStyle); }
  toggleLayer($('t-label').classList.contains('on'), cur.labels);
  toggleLayer($('t-admin').classList.contains('on'), cur.admin);
}
function toggleLayer(on, layer){ if(!layer) return; if(on){ if(!map.hasLayer(layer)) layer.addTo(map);} else { if(map.hasLayer(layer)) map.removeLayer(layer);} }
function press(btn,on){ btn.classList.toggle('on',on); }
$('t-fill').onclick = e=>{ mode='fill'; press(e.target,true); press($('t-line'),false); applyToggles(); };
$('t-line').onclick = e=>{ mode='line'; press(e.target,true); press($('t-fill'),false); applyToggles(); };
$('t-label').onclick= e=>{ press(e.target,!e.target.classList.contains('on')); applyToggles(); };
$('t-admin').onclick= e=>{ press(e.target,!e.target.classList.contains('on')); applyToggles(); };

// ---------- 지번 검색 ----------
function search(){
  const v=$('q').value.trim(); if(!v||!curParcels){ setStatus('먼저 동을 선택하세요.'); return; }
  let hit=null;
  curParcels.eachLayer(l=>{ const p=l.feature.properties;
    if(!hit && (p.지번===v||p.지번===('산'+v))) hit=l; });
  if(hit){ const p=hit.feature.properties; map.fitBounds(hit.getBounds(),{maxZoom:18});
    hit.openPopup(); $('res').innerHTML=`<b>${p.법정동} ${p.지번}</b><br>${p.통}통 ${p.반||''}반`; setStatus(''); }
  else setStatus(`"${v}" 지번을 찾지 못했습니다.`);
}
$('go').onclick = search;
$('q').addEventListener('keydown', e=>{ if(e.key==='Enter') search(); });

// ---------- 다중 통 선택 ----------
function selectSingle(t){ selected.clear(); selected.add(t); afterSel(); }
function toggleTong(t){ selected.has(t) ? selected.delete(t) : selected.add(t); afterSel(); }
function clearSelection(){ selected.clear(); afterSel(); }
function afterSel(){
  if(cur.parcels) cur.parcels.setStyle(pStyle);
  if(cur.tong) cur.tong.setStyle(tongStyle);
  updateSelPanel();
}
function updateSelPanel(){
  const bar=$('selbar'); if(!bar) return;
  if(!selActive()){ bar.style.display='none'; return; }
  bar.style.display='block';
  const arr=[...selected].sort((a,b)=>a-b);
  $('selcount').textContent = `${arr.length}개 통 선택됨`;
  $('selchips').innerHTML = arr.map(t=>
    `<span class="chip" style="border-color:${color(t)}">${t}통<b data-t="${t}">×</b></span>`).join('');
  $('selchips').querySelectorAll('b[data-t]').forEach(x=>
    x.onclick = ()=>{ selected.delete(+x.dataset.t); afterSel(); });
  let nParcel=0;
  if(cur.parcels) cur.parcels.eachLayer(l=>{ if(selected.has(l.feature.properties.통)) nParcel++; });
  $('selinfo').textContent = `통 ${arr.join(', ')} · 필지 합계 ${nParcel}개`;
}
$('sel-clear').onclick = clearSelection;

// ---------- 모바일 패널 ----------
$('panel-toggle').onclick = ()=> $('panel').classList.toggle('open');
</script>
</body></html>
